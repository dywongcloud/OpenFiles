fs_id = "ofss-storj-prod"
name = "storj-openfiles"
object_prefix = ""

[backend]
provider = "storj"
bucket = "REPLACE_ME_BUCKET"
endpoint = "https://gateway.storjshare.io"
region = "us-east-1"
access_key_id = "REPLACE_ME_STORJ_ACCESS_KEY"
secret_access_key = "REPLACE_ME_STORJ_SECRET_KEY"

[cache]
dir = "/var/lib/openfiles/cache/storj"
direct_read_threshold_bytes = 1048576
capacity_bytes = 274877906944

[sync]
export_batch_window_secs = 60

[[sync.import_rules]]
prefix = ""
trigger = "on-directory-first-access"
size_less_than = 131072

[sync.expiration]
days_after_last_access = 30
