fs_id = "ofss-local-dev"
name = "local-openfiles"
object_prefix = ""

[backend]
provider = "local-fs"
root = "./object-store"

[cache]
dir = "./.openfiles-cache"
direct_read_threshold_bytes = 1048576
capacity_bytes = 68719476736

[sync]
export_batch_window_secs = 60

[[sync.import_rules]]
prefix = ""
trigger = "on-directory-first-access"
size_less_than = 131072

[sync.expiration]
days_after_last_access = 30

[nats]
enabled = false
url = "nats://127.0.0.1:4222"
subject_prefix = "openfiles"
# queue_group defaults to "<subject_prefix>.<fs_id>.workers" when omitted.
# instance_id defaults to a random UUID when omitted.
request_timeout_ms = 30000
max_payload_bytes = 10485760
publish_events = true
